# Agent: rasool | Sprint: 01 | Date: 2026-03-16
# Alembic configuration for INFRAVIZ — PostgreSQL via Aurora Serverless v2
# DATABASE_URL is injected at runtime from environment (SSM /infraviz/db-url)
# Do NOT hardcode credentials here.

[alembic]
# script_location points to the migrations package directory
script_location = backend/migrations

# Version locations — single location for Sprint-01
version_locations = %(here)s/versions

# File name template for new migration scripts
file_template = %%(rev)s_%%(slug)s

# Truncate revision IDs to 12 chars for readability
truncate_slug_length = 40

# Timezone for revision timestamps
timezone = UTC

# DATABASE_URL is set programmatically in env.py from the DATABASE_URL env var.
# This placeholder is overridden at runtime — do not set a real URL here.
sqlalchemy.url =

# Source encoding for migration script files
source_encoding = utf-8

[post_write_hooks]
# No post-write hooks required for Sprint-01

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
