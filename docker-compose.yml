# Agent: Arjun | Sprint: 01 | Date: 2026-03-29
# Team Panchayat — Docker Compose Cluster
# Usage: docker compose up --build
#
# Includes Ollama for fully offline, zero-API-cost agent code generation.
# GPU (NVIDIA): docker compose --profile gpu up --build
# CPU only:     docker compose up --build

version: '3.9'

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  workspace_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}
  ollama_data:          # persists pulled models across restarts

networks:
  panchayat:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ── Reusable agent config ─────────────────────────────────────────────────────
x-agent-base: &agent-base
  build:
    context: .
    dockerfile: Dockerfile.base
  volumes:
    - .:/workspace:rw
  networks:
    - panchayat
  restart: on-failure
  environment:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
    - WORKSPACE=/workspace
  depends_on:
    dashboard:
      condition: service_healthy
    ollama:
      condition: service_healthy
  healthcheck:
    test: >
      sh -c "node -e \"
        const fs=require('fs');
        const s=JSON.parse(fs.readFileSync('/workspace/agent-status.json','utf8'));
        const a=s[process.env.AGENT_NAME||'arjun'];
        if(!a||!a.updated) process.exit(1);
        const age=(Date.now()-new Date(a.updated).getTime())/1000;
        if(age>300) process.exit(1);
        process.exit(0);
      \""
    interval: 30s
    timeout: 10s
    start-period: 120s
    retries: 3

services:

  # ── Ollama — Local LLM (CPU, always on) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: panchayat-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - panchayat
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 5
    labels:
      - "com.panchayat.role=llm"

  # ── Ollama (GPU variant — NVIDIA only) ────────────────────────────────────────
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: panchayat-ollama-gpu
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - panchayat
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      start_period: 30s
      retries: 5
    labels:
      - "com.panchayat.role=llm-gpu"

  # ── Ollama Init — pull model on first start ───────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: panchayat-ollama-init
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - panchayat
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...';
        until ollama list > /dev/null 2>&1; do sleep 3; done;
        echo 'Pulling model: ${OLLAMA_MODEL:-qwen2.5-coder:7b}';
        ollama pull ${OLLAMA_MODEL:-qwen2.5-coder:7b};
        echo 'Model ready.';
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    labels:
      - "com.panchayat.role=llm-init"

  # ── Dashboard ────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: panchayat-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - .:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - panchayat
    restart: unless-stopped
    environment:
      - WORKSPACE=/workspace
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-panchayat}
      - PORT=3000
      - OLLAMA_ENDPOINT=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "com.panchayat.role=dashboard"
      - "com.panchayat.sprint=dynamic"

  # ── Arjun — Orchestrator (Claude Opus) ───────────────────────────────────────
  arjun:
    <<: *agent-base
    container_name: panchayat-arjun
    environment:
      - AGENT_NAME=arjun
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${ARJUN_MODEL:-claude-opus-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    labels:
      - "com.panchayat.agent=arjun"
      - "com.panchayat.role=orchestrator"
      - "com.panchayat.sprint=dynamic"

  # ── Vikram — Cloud Architect ──────────────────────────────────────────────────
  vikram:
    <<: *agent-base
    container_name: panchayat-vikram
    environment:
      - AGENT_NAME=vikram
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    labels:
      - "com.panchayat.agent=vikram"
      - "com.panchayat.role=infra"
      - "com.panchayat.sprint=dynamic"

  # ── Rasool — Database Agent ───────────────────────────────────────────────────
  rasool:
    <<: *agent-base
    container_name: panchayat-rasool
    environment:
      - AGENT_NAME=rasool
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-adlc}
      - POSTGRES_USER=${POSTGRES_USER:-adlc_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    labels:
      - "com.panchayat.agent=rasool"
      - "com.panchayat.role=database"
      - "com.panchayat.sprint=dynamic"

  # ── Kavya — UX Designer ───────────────────────────────────────────────────────
  kavya:
    <<: *agent-base
    container_name: panchayat-kavya
    environment:
      - AGENT_NAME=kavya
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    labels:
      - "com.panchayat.agent=kavya"
      - "com.panchayat.role=ux"
      - "com.panchayat.sprint=dynamic"

  # ── Kiran — Backend Engineer ──────────────────────────────────────────────────
  kiran:
    <<: *agent-base
    container_name: panchayat-kiran
    environment:
      - AGENT_NAME=kiran
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    labels:
      - "com.panchayat.agent=kiran"
      - "com.panchayat.role=backend"
      - "com.panchayat.sprint=dynamic"

  # ── Rohan — Frontend Engineer ─────────────────────────────────────────────────
  rohan:
    <<: *agent-base
    container_name: panchayat-rohan
    environment:
      - AGENT_NAME=rohan
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    labels:
      - "com.panchayat.agent=rohan"
      - "com.panchayat.role=frontend"
      - "com.panchayat.sprint=dynamic"

  # ── Keerthi — QA Agent (starts in standby, activated by Arjun) ───────────────
  keerthi:
    <<: *agent-base
    container_name: panchayat-keerthi
    environment:
      - AGENT_NAME=keerthi
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${AGENT_MODEL:-claude-sonnet-4-5}
      - CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1
      - WORKSPACE=/workspace
    restart: "no"
    profiles:
      - qa
    labels:
      - "com.panchayat.agent=keerthi"
      - "com.panchayat.role=qa"
      - "com.panchayat.sprint=dynamic"
